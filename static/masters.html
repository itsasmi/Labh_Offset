  <main class="container">
    <div class="tab-switcher" style="margin-bottom: 24px;">
      <button class="tab-btn active" id="tab-btn-parties" onclick="switchTab('parties')">PARTIES</button>
      <button class="tab-btn" id="tab-btn-papers" onclick="switchTab('papers')">PAPER CODES</button>
      <button class="tab-btn" id="tab-btn-operators" onclick="switchTab('operators')">OPERATORS</button>
      <button class="tab-btn" id="tab-btn-users" onclick="switchTab('users')" style="display:none;">USERS</button>
    </div>

    <!-- Parties Tab -->
    <div id="section-parties" class="master-section">
      <div class="filter-bar" style="margin-bottom: 20px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);">
        <div style="font-size: 11px; font-weight: 700; color: var(--text3); margin-bottom: 12px;">ADD PARTY</div>
        <div class="form-row form-row-3" style="margin-bottom: 0; align-items: end;">
          <div class="form-group"><input type="text" id="add-party-code" class="form-control" placeholder="CODE"></div>
          <div class="form-group"><input type="text" id="add-party-name" class="form-control" placeholder="FULL NAME"></div>
          <button class="btn btn-primary btn-block" onclick="addParty()">ADD</button>
        </div>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>CODE</th>
              <th>NAME</th>
              <th class="td-right">ACTION</th>
            </tr>
          </thead>
          <tbody id="parties-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Papers Tab -->
    <div id="section-papers" class="master-section" style="display: none;">
      <div class="filter-bar" style="margin-bottom: 20px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);">
        <div style="font-size: 11px; font-weight: 700; color: var(--text3); margin-bottom: 12px;">ADD PAPER</div>
        <div class="form-row form-row-4" style="margin-bottom: 0; align-items: end;">
          <div class="form-group"><input type="text" id="add-paper-code" class="form-control" placeholder="CODE"></div>
          <div class="form-group"><input type="text" id="add-paper-desc" class="form-control" placeholder="DESC"></div>
          <div class="form-group"><input type="text" id="add-paper-gsm" class="form-control" placeholder="GSM" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')"></div>
          <button class="btn btn-primary btn-block" onclick="addPaper()">ADD</button>
        </div>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>CODE</th>
              <th>DESC</th>
              <th>GSM</th>
            </tr>
          </thead>
          <tbody id="papers-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Operators Tab -->
    <div id="section-operators" class="master-section" style="display: none;">
      <div class="filter-bar" style="margin-bottom: 20px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);">
        <div style="font-size: 11px; font-weight: 700; color: var(--text3); margin-bottom: 12px;">ADD OPERATOR</div>
        <div class="form-row form-row-3" style="margin-bottom: 0; align-items: end;">
          <div class="form-group"><input type="text" id="add-op-name" class="form-control" placeholder="NAME"></div>
          <div class="form-group"><input type="text" id="add-op-role" class="form-control" placeholder="ROLE"></div>
          <button class="btn btn-primary btn-block" onclick="addOperator()">ADD</button>
        </div>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>NAME</th>
              <th>ROLE</th>
            </tr>
          </thead>
          <tbody id="operators-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Users Tab -->
    <div id="section-users" class="master-section" style="display: none;">
      <div class="filter-bar" style="margin-bottom: 20px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg);">
        <div style="font-size: 11px; font-weight: 700; color: var(--text3); margin-bottom: 12px;">ADD USER</div>
        <div class="form-row form-row-3" style="margin-bottom: 0; align-items: end;">
          <div class="form-group"><input type="text" id="add-user-username" class="form-control" placeholder="USERNAME"></div>
          <div class="form-group"><input type="password" id="add-user-password" class="form-control" placeholder="PASSWORD"></div>
          <button class="btn btn-primary btn-block" onclick="addUser()">ADD</button>
        </div>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>USERNAME</th>
              <th>ROLE</th>
              <th class="td-right">ACTION</th>
            </tr>
          </thead>
          <tbody id="users-body"></tbody>
        </table>
      </div>
    </div>

  <script>
    const API_BASE = '/api';

    // Hamburger Menu Logic
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const menuOverlay = document.getElementById('menu-overlay');
    const sideMenu = document.getElementById('side-menu');
    const menuCloseBtn = document.getElementById('menu-close-btn');

    function toggleMenu() {
      menuOverlay.classList.toggle('open');
      sideMenu.classList.toggle('open');
    }

    hamburgerBtn.addEventListener('click', toggleMenu);
    menuCloseBtn.addEventListener('click', toggleMenu);
    menuOverlay.addEventListener('click', toggleMenu);

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`tab-btn-${tab}`).classList.add('active');
      document.querySelectorAll('.master-section').forEach(s => s.style.display = 'none');
      document.getElementById(`section-${tab}`).style.display = 'block';
      if (tab === 'parties') loadParties();
      if (tab === 'papers') loadPapers();
      if (tab === 'operators') loadOperators();
      if (tab === 'users') loadUsers();
    }

    async function loadParties() {
      const tbody = document.getElementById('parties-body');
      try {
        const res = await fetch(`${API_BASE}/parties`);
        const data = await res.json();
        tbody.innerHTML = data.map(p => `
          <tr class="fade-up">
            <td data-label="CODE" style="font-family: var(--mono); color: var(--blue); font-weight: 600;">${p.party_code}</td>
            <td data-label="NAME" style="font-weight: 600;">${p.party_name}</td>
            <td data-label="ACTION" class="td-right"><button class="btn btn-secondary btn-sm" style="min-height:32px; padding:4px 12px;">✏️ EDIT</button></td>
          </tr>
        `).join('');
      } catch (err) { tbody.innerHTML = '<tr><td colspan="3"><div class="empty-state">Error</div></td></tr>'; }
    }

    async function loadPapers() {
      const tbody = document.getElementById('papers-body');
      try {
        const res = await fetch(`${API_BASE}/papers`);
        const data = await res.json();
        tbody.innerHTML = data.map(p => `
          <tr class="fade-up">
            <td data-label="CODE" style="font-family: var(--mono); color: var(--blue); font-weight: 600;">${p.paper_code}</td>
            <td data-label="DESC">${p.description}</td>
            <td data-label="GSM">${p.gsm || '—'}</td>
          </tr>
        `).join('');
      } catch (err) { tbody.innerHTML = '<tr><td colspan="3"><div class="empty-state">Error</div></td></tr>'; }
    }

    async function loadOperators() {
      const tbody = document.getElementById('operators-body');
      try {
        const res = await fetch(`${API_BASE}/operators`);
        const data = await res.json();
        if (data.length > 0) {
          tbody.innerHTML = data.map(op => `
            <tr class="fade-up">
              <td data-label="NAME" style="font-weight: 600;">${op.name}</td>
              <td data-label="ROLE" style="color: var(--text3);">${op.role || 'Operator'}</td>
            </tr>
          `).join('');
        } else {
          tbody.innerHTML = '<tr><td colspan="2" style="padding: 60px 20px !important; text-align: center !important; border: none !important;"><div class="empty-state">No plate providers found.</div></td></tr>';
        }
      } catch (err) { tbody.innerHTML = '<tr><td colspan="2" style="padding: 60px 20px !important; text-align: center !important; border: none !important;"><div class="empty-state">Error</div></td></tr>'; }
    }

    async function addParty() {
      const code = document.getElementById('add-party-code').value.trim();
      const name = document.getElementById('add-party-name').value.trim();
      if (!code || !name) return;
      await fetch(`${API_BASE}/parties`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ party_code: code, party_name: name })
      });
      document.getElementById('add-party-code').value = '';
      document.getElementById('add-party-name').value = '';
      loadParties();
    }

    async function addPaper() {
      const code = document.getElementById('add-paper-code').value.trim();
      const desc = document.getElementById('add-paper-desc').value.trim();
      const gsm = parseInt(document.getElementById('add-paper-gsm').value) || null;
      if (!code || !desc) return;
      await fetch(`${API_BASE}/papers`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ paper_code: code, description: desc, gsm: gsm })
      });
      document.getElementById('add-paper-code').value = '';
      document.getElementById('add-paper-desc').value = '';
      document.getElementById('add-paper-gsm').value = '';
      loadPapers();
    }

    async function addOperator() {
      const name = document.getElementById('add-op-name').value.trim();
      const role = document.getElementById('add-op-role').value.trim();
      if (!name) return;
      await fetch(`${API_BASE}/operators`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, role })
      });
      document.getElementById('add-op-name').value = '';
      document.getElementById('add-op-role').value = '';
      loadOperators();
    }

    async function loadUsers() {
      const tbody = document.getElementById('users-body');
      try {
        const res = await fetch(`${API_BASE}/users`);
        if (!res.ok) return;
        const data = await res.json();
        if (data.length > 0) {
          tbody.innerHTML = data.map(u => `
            <tr class="fade-up">
              <td data-label="USERNAME" style="font-weight: 600;">${u.username}</td>
              <td data-label="ROLE">
                <span class="badge ${u.is_admin ? 'badge-blue' : 'badge-gray'}">${u.is_admin ? 'Admin' : 'User'}</span>
              </td>
              <td data-label="ACTION" class="td-right">
                <button class="btn btn-secondary btn-sm" onclick="changePassword(${u.id})">🔑 PASS</button>
                <button class="btn btn-secondary btn-sm" style="color:var(--red);" onclick="deleteUser(${u.id})">🗑️ DEL</button>
              </td>
            </tr>
          `).join('');
        } else {
          tbody.innerHTML = '<tr><td colspan="3" style="padding: 60px 20px !important; text-align: center !important; border: none !important;"><div class="empty-state">No users found.</div></td></tr>';
        }
      } catch (err) { tbody.innerHTML = '<tr><td colspan="3" style="padding: 60px 20px !important; text-align: center !important; border: none !important;"><div class="empty-state">Error loading users</div></td></tr>'; }
    }

    async function addUser() {
      const username = document.getElementById('add-user-username').value.trim();
      const password = document.getElementById('add-user-password').value;
      if (!username || !password) return;
      const res = await fetch(`${API_BASE}/users`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      if (res.ok) {
        document.getElementById('add-user-username').value = '';
        document.getElementById('add-user-password').value = '';
        loadUsers();
      } else {
        const err = await res.json();
        alert(err.detail || 'Error adding user');
      }
    }

    async function deleteUser(id) {
      if (!confirm('Are you sure you want to delete this user?')) return;
      const res = await fetch(`${API_BASE}/users/${id}`, { method: 'DELETE' });
      if (res.ok) loadUsers();
      else alert('Error deleting user or cannot delete yourself.');
    }

    async function changePassword(id) {
      const newPassword = prompt('Enter new password:');
      if (!newPassword) return;
      const res = await fetch(`${API_BASE}/users/${id}/password`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: newPassword })
      });
      if (res.ok) alert('Password updated successfully');
      else alert('Error updating password');
    }

    async function checkAdminStatus() {
      try {
        const res = await fetch(`${API_BASE}/me`);
        if (res.ok) {
          const user = await res.json();
          if (user.is_admin) {
            document.getElementById('tab-btn-users').style.display = 'inline-block';
          }
        }
      } catch (err) { console.error('Error checking admin status', err); }
    }

    checkAdminStatus();
    loadParties();
  </script>

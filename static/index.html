  <main class="container">
    <!-- Search Hero -->
    <div class="search-hero fade-up">
      <div class="search-hero-content">
        <h2 class="search-hero-title">Find job records, parties, materials, and invoices instantly.</h2>
        <div class="search-input-wrapper">
          <input type="text" class="form-control" id="f-global-search" placeholder="Search by Job Name, Bill No, Party...">
          <button class="search-btn" id="btn-search-trigger">Search</button>
        </div>
      </div>
    </div>

    <!-- Filter Chips -->
    <div class="filter-chips-container fade-up delay-1">
      <input type="text" list="party-list" class="filter-chip" id="f-party" placeholder="Party Code...">
      <datalist id="party-list"></datalist>
      
      <input type="text" list="paper-list" class="filter-chip" id="f-paper" placeholder="Paper Code...">
      <datalist id="paper-list"></datalist>

      <select class="filter-chip" id="f-time">
        <option value="">All Time</option>
        <option value="today" selected>Today</option>
        <option value="last_7">Last 7 Days</option>
        <option value="last_30">Last 30 Days</option>
        <option value="last_3_months">Last 3 Months</option>
        <option value="last_6_months">Last 6 Months</option>
        <option value="curr_year">This Year</option>
        <option value="custom">Custom Date Range</option>
      </select>

      <select class="filter-chip" id="f-supplier">
        <option value="">All Suppliers</option>
        <option value="Shantaram">Shantaram</option>
        <option value="Parth">Parth</option>
      </select>

      <select class="filter-chip" id="f-machine">
        <option value="">All Machines</option>
        <option value="635x775">Big Machine (635x775)</option>
        <option value="550x670">Small Machine (550x670)</option>
        
      </select>

      <select class="filter-chip" id="f-limit">
        <option value="10">Show 10</option>
        <option value="50" selected>Show 50</option>
        <option value="100">Show 100</option>
        <option value="custom">Custom Range</option>
      </select>

      <input type="number" class="filter-chip-input" id="f-limit-custom" min="1" placeholder="Enter limit..." style="display: none;">
    </div>

    <!-- Custom Date Range -->
    <div class="date-range-container" id="custom-date-container">
      <div class="date-input-group">
        <label>From Date</label>
        <input type="date" class="form-control" id="f-date-from">
      </div>
      <div class="date-input-group">
        <label>To Date</label>
        <input type="date" class="form-control" id="f-date-to">
      </div>
    </div>

    <!-- Search Results -->
    <div class="results-header-row">
      <div class="results-title-badge uppercase" id="results-title">Recent Jobs</div>
      <div class="results-line"></div>
    </div>
    
    <div class="table-container fade-up delay-2">
      <table id="jobs-table">
        <thead>
          <tr>
            <th>JOB#</th>
            <th>PARTY</th>
            <th>JOB NAME</th>
            <th>PAPER / SIZE</th>
            <th class="td-right">ACTION</th>
          </tr>
        </thead>
        <tbody id="jobs-body">
          <tr><td colspan="5"><div class="row-spinner"><div class="spinner"></div>Loading...</div></td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>

    // Hamburger Menu Logic
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const menuOverlay = document.getElementById('menu-overlay');
    const sideMenu = document.getElementById('side-menu');
    const menuCloseBtn = document.getElementById('menu-close-btn');

    function toggleMenu() {
      menuOverlay.classList.toggle('open');
      sideMenu.classList.toggle('open');
    }

    hamburgerBtn.addEventListener('click', toggleMenu);
    menuCloseBtn.addEventListener('click', toggleMenu);
    menuOverlay.addEventListener('click', toggleMenu);

    const API_BASE = '/api';

    // Filters & Inputs
    const fGlobal = document.getElementById('f-global-search');
    const fParty = document.getElementById('f-party');
    const fPaper = document.getElementById('f-paper');
    const fTime = document.getElementById('f-time');
    const fSupplier = document.getElementById('f-supplier');
    const fMachine = document.getElementById('f-machine');
    const fLimit = document.getElementById('f-limit');
    const fLimitCustom = document.getElementById('f-limit-custom');
    const customDateContainer = document.getElementById('custom-date-container');
    const fDateFrom = document.getElementById('f-date-from');
    const fDateTo = document.getElementById('f-date-to');
    const resultsTitle = document.getElementById('results-title');

    // Debounce timer
    let fetchTimer;

    // Load Masters
    async function loadMasters() {
      try {
        const [partyRes, paperRes] = await Promise.all([
          fetch(`${API_BASE}/parties`),
          fetch(`${API_BASE}/papers`)
        ]);
        if (partyRes.ok) {
          const parties = await partyRes.json();
          const list = document.getElementById('party-list');
          list.innerHTML = '';
          parties.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.party_code;
            opt.label = p.party_name;
            list.appendChild(opt);
          });
        }
        if (paperRes.ok) {
          const papers = await paperRes.json();
          const list = document.getElementById('paper-list');
          list.innerHTML = '';
          papers.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.paper_code;
            opt.label = p.description;
            list.appendChild(opt);
          });
        }
      } catch (err) {
        console.error('Failed to load masters', err);
      }
    }

    // Fetch Jobs
    async function fetchJobs() {
      try {
        const tbody = document.getElementById('jobs-body');
        tbody.innerHTML = `<tr><td colspan="5"><div class="row-spinner"><div class="spinner"></div>Loading...</div></td></tr>`;

        // Calculate limit
        let limitVal = 50;
        if (fLimit.value === 'custom') {
          limitVal = parseInt(fLimitCustom.value) || 50;
        } else {
          limitVal = parseInt(fLimit.value) || 50;
        }

        const params = new URLSearchParams({ limit: limitVal });
        
        if (fGlobal.value.trim()) params.set('global_query', fGlobal.value.trim());
        if (fParty.value.trim()) params.set('party_code', fParty.value.trim());
        if (fPaper.value.trim()) params.set('paper_query', fPaper.value.trim());
        if (fSupplier.value.trim()) params.set('operator', fSupplier.value.trim());
        if (fMachine.value.trim()) params.set('plate_size', fMachine.value.trim());
        
        const timeVal = fTime.value;
        if (timeVal === 'custom') {
          if (fDateFrom.value) params.set('date_from', fDateFrom.value);
          if (fDateTo.value) params.set('date_to', fDateTo.value);
        } else if (timeVal) {
          params.set('time_filter', timeVal);
        }

        const res = await fetch(`${API_BASE}/jobs?${params.toString()}`);
        if (!res.ok) throw new Error('API Error');
        const data = await res.json();
        
        tbody.innerHTML = '';
        
        if (data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" style="padding: 60px 20px !important; text-align: center !important; border: none !important;">
            <div class="empty-state" style="margin: 0 auto; display: flex; flex-direction: column; align-items: center;">
              <div class="empty-icon" style="font-size:32px; margin-bottom:12px">🔍</div>
              <div class="empty-title" style="font-size: 16px; color: var(--text);">No jobs found</div>
              <div class="empty-subtitle" style="font-size: 12px; color: var(--text3);">Try adjusting your search or filters</div>
            </div>
          </td></tr>`;
          resultsTitle.textContent = "0 Results";
          return;
        }

        resultsTitle.textContent = `${data.length} Result${data.length !== 1 ? 's' : ''}`;

        data.forEach((job, index) => {
          const tr = document.createElement('tr');
          tr.className = 'clickable fade-up';
          tr.style.animationDelay = `${index * 20}ms`;
          tr.onclick = () => location.href = `jobcard.html?job=${job.id || job.job_id}`;
          
          let actionBtn = `<button class="btn" style="background: var(--surface2); color: var(--primary); padding: 10px 16px; font-size: 12px; font-weight: 700; text-decoration: none; border-radius: var(--radius-sm); border: 1px solid var(--border); width: 100%; max-width: 200px; margin: 0 auto;">VIEW ➔</button>`;
          
          let paperInfo = '—';
          if (job.gsm_desc || job.paper_size || job.paper_code) {
            paperInfo = `<div style="font-size: 11px;">${job.gsm_desc || job.paper_code || ''}</div>
                         <div style="font-size: 10px; color: var(--text3);">${job.paper_size || ''}</div>
                         <div style="font-size: 10px; font-weight: 700; color: var(--orange); margin-top: 2px;">${job.total_sheets ? job.total_sheets.toLocaleString() + ' sheets' : ''}</div>`;
          }

          tr.innerHTML = `
            <td class="td-mono" data-label="JOB#">${job.id || job.job_id}</td>
            <td data-label="PARTY">${job.party_name}</td>
            <td data-label="JOB NAME">${job.job_name}</td>
            <td data-label="PAPER / SIZE">${paperInfo}</td>
            <td data-label="ACTION" style="padding: 16px !important; text-align: center !important; border: none !important;">${actionBtn}</td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        console.error('Failed to load jobs', err);
        document.getElementById('jobs-body').innerHTML = `<tr><td colspan="4" class="text-red">Error loading jobs</td></tr>`;
      }
    }

    // Event Listeners
    function updateChipHighlights() {
      [fParty, fPaper, fTime, fSupplier, fMachine, fLimit].forEach(el => {
        if (el === fLimit) {
          if (el.value === 'custom') {
            el.classList.add('active-filter');
          } else {
            el.classList.remove('active-filter');
          }
        } else if (el.value !== "") {
          el.classList.add('active-filter');
        } else {
          el.classList.remove('active-filter');
        }
      });

      if (fLimit.value === 'custom' && fLimitCustom.value !== "") {
        fLimitCustom.classList.add('active-filter');
      } else {
        fLimitCustom.classList.remove('active-filter');
      }
    }

    function triggerFetch() {
      updateChipHighlights();
      clearTimeout(fetchTimer);
      fetchTimer = setTimeout(fetchJobs, 300);
    }

    // Search Trigger button click
    document.getElementById('btn-search-trigger').addEventListener('click', triggerFetch);

    // Enter key press in text fields triggers search
    [fGlobal, fParty, fPaper, fLimitCustom, fDateFrom, fDateTo].forEach(el => {
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          triggerFetch();
        }
      });
    });

    fGlobal.addEventListener('input', () => {
      if (fGlobal.value.trim() !== "" && fTime.value === "today") {
        fTime.value = "";
      }
      updateChipHighlights();
    });
    fParty.addEventListener('input', updateChipHighlights);
    fParty.addEventListener('change', triggerFetch);
    fPaper.addEventListener('input', updateChipHighlights);
    fPaper.addEventListener('change', triggerFetch);
    
    fSupplier.addEventListener('change', triggerFetch);
    fMachine.addEventListener('change', triggerFetch);
    fDateFrom.addEventListener('change', triggerFetch);
    fDateTo.addEventListener('change', triggerFetch);

    fTime.addEventListener('change', () => {
      if (fTime.value === 'custom') {
        customDateContainer.classList.add('active');
        // Set default dates if empty
        if (!fDateFrom.value || !fDateTo.value) {
            const todayStr = new Date().toISOString().split('T')[0];
            if (!fDateFrom.value) fDateFrom.value = todayStr;
            if (!fDateTo.value) fDateTo.value = todayStr;
        }
      } else {
        customDateContainer.classList.remove('active');
      }
      triggerFetch();
    });

    fLimit.addEventListener('change', () => {
      if (fLimit.value === 'custom') {
        fLimitCustom.style.display = 'inline-block';
        fLimitCustom.value = '50';
        fLimitCustom.focus();
      } else {
        fLimitCustom.style.display = 'none';
      }
      triggerFetch();
    });

    fLimitCustom.addEventListener('input', updateChipHighlights);

    // Init
    loadMasters().then(() => {
      updateChipHighlights();
      fetchJobs();
    });
  </script>

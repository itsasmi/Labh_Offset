<!DOCTYPE html>
<html lang="en">
<head>
  <script src="theme.js?v=5"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labh Offset - Dashboard</title>
  <link rel="stylesheet" href="style.css?v=5">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <!-- Top Bar -->
  <header class="topbar">
    <div class="topbar-left">
      <img src="Icon/logo-img.png" class="logo-img" alt="Logo">
    </div>
    <div class="topbar-center">DASHBOARD</div>
    <div class="topbar-right">
      <button class="hamburger" id="hamburger-btn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- Side Menu -->
  <div class="menu-overlay" id="menu-overlay"></div>
  <nav class="side-menu" id="side-menu">
    <div class="side-menu-header">
      <img src="Icon/logo-img.png" class="logo-img" alt="Logo">
      <button class="panel-close" id="menu-close-btn" aria-label="Close">✕</button>
    </div>
    <div class="menu-items">
    <a href="settings.html?v=3" class="menu-item">⚙ Settings</a>

      <a href="inward.html?v=3" class="menu-item">≡ Inward Register</a>
      <a href="outward.html?v=3" class="menu-item">≡ Outward Register</a>
      <a href="masters.html?v=3" class="menu-item">≡ Master Data</a>
      <div class="menu-divider"></div>
      
    </div>
  </nav>

  <main class="container">
    <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
      <div style="font-weight: 500; font-size: 14px; color: var(--text);">Good morning</div>
      <div id="current-date" style="font-size: 12px; color: var(--text2);" class="mono"></div>
    </div>

    <!-- Stat Cards -->
    <div class="stat-cards-container" id="stat-cards">
      <div class="stat-card skeleton fade-up delay-1" style="height: 66px"></div>
      <div class="stat-card skeleton fade-up delay-2" style="height: 66px"></div>
      <div class="stat-card skeleton fade-up delay-3" style="height: 66px"></div>
    </div>

    <!-- Quick Actions -->
    <div style="font-size: 10px; font-weight: 600; color: var(--text2); letter-spacing: 0.1em; margin-bottom: 12px;" class="uppercase">Quick Actions</div>
    <div class="quick-actions-grid">
      <div class="action-card fade-up delay-1" onclick="location.href='entry.html'">
        <div class="action-icon" style="color: var(--orange)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
        </div>
        <div class="action-label">+ NEW JOB</div>
      </div>
      <div class="action-card fade-up delay-2" onclick="location.href='jobcard.html'">
        <div class="action-icon" style="color: var(--blue)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        </div>
        <div class="action-label">PRINT CARD</div>
      </div>
      <div class="action-card fade-up delay-3" onclick="location.href='inward.html'">
        <div class="action-icon" style="color: var(--green)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        </div>
        <div class="action-label">LOG INWARD</div>
      </div>
      <div class="action-card fade-up delay-4" onclick="location.href='stock.html'">
        <div class="action-icon" style="color: var(--teal)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
        </div>
        <div class="action-label">VIEW STOCK</div>
      </div>
    </div>

    <!-- Today's Jobs -->
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; margin-top: 24px;">
      <div style="font-size: 10px; font-weight: 600; color: var(--text2); letter-spacing: 0.1em;" class="uppercase">Today's Jobs</div>
      <div style="flex-grow: 1; height: 1px; background: var(--border2); margin-left: 12px;"></div>
    </div>
    
    <div class="table-container fade-up delay-4">
      <table id="today-jobs-table">
        <thead>
          <tr>
            <th>JOB#</th>
            <th>PARTY</th>
            <th>JOB NAME</th>
            <th>STATUS</th>
          </tr>
        </thead>
        <tbody id="today-jobs-body">
          <tr><td colspan="4"><div class="row-spinner"><div class="spinner"></div>Loading...</div></td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="index.html?v=3" class="nav-item active">
      <div class="nav-icon-wrapper"><div class="nav-icon">⊞</div></div>
      <div class="nav-label">DASH</div>
    </a>
    <a href="jobcard.html?v=3" class="nav-item">
      <div class="nav-icon-wrapper"><div class="nav-icon">▦</div></div>
      <div class="nav-label">CARD</div>
    </a>
    <a href="entry.html?v=3" class="nav-item">
      <div class="nav-icon-wrapper"><div class="nav-icon">⊕</div></div>
      <div class="nav-label">NEW</div>
    </a>
    <a href="stock.html?v=3" class="nav-item">
      <div class="nav-icon-wrapper"><div class="nav-icon">◈</div></div>
      <div class="nav-label">STOCK</div>
    </a>
    <a href="pending.html?v=3" class="nav-item">
      <div class="nav-icon-wrapper"><div class="nav-icon">◷</div></div>
      <div class="nav-label">PEND</div>
    </a>
  </nav>

  <script>
    // Set Current Date
    const dateOpts = { day: 'numeric', month: 'short', year: 'numeric' };
    document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-GB', dateOpts);

    // Hamburger Menu Logic
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const menuOverlay = document.getElementById('menu-overlay');
    const sideMenu = document.getElementById('side-menu');
    const menuCloseBtn = document.getElementById('menu-close-btn');

    function toggleMenu() {
      menuOverlay.classList.toggle('open');
      sideMenu.classList.toggle('open');
    }

    hamburgerBtn.addEventListener('click', toggleMenu);
    menuCloseBtn.addEventListener('click', toggleMenu);
    menuOverlay.addEventListener('click', toggleMenu);

    const API_BASE = '/api';

    // Fetch Dashboard Stats
    async function fetchStats() {
      try {
        const res = await fetch(`${API_BASE}/dashboard`);
        if (!res.ok) throw new Error('API Error');
        const data = await res.json();
        
        const statCards = document.getElementById('stat-cards');
        statCards.innerHTML = '';
        
        // Card 1: Today's Jobs
        const tJobs = data.today_jobs || 0;
        let c1 = 'text3';
        if (tJobs > 0) c1 = 'primary';
        
        // Card 2: Pending
        const pending = (data.pending_jobs || 0) + (data.in_progress_jobs || 0);
        let c2 = '';
        if (pending > 5) c2 = 'warning';
        else if (pending === 0) c2 = 'good';
        
        // Card 3: Alerts
        const alerts = (data.low_party_stock_count || 0) + (data.low_company_stock_count || 0);
        let c3 = 'good';
        if (alerts > 0) c3 = 'danger';

        statCards.innerHTML = `
          <div class="stat-card ${c1} fade-up">
            <div class="stat-num ${tJobs > 0 ? 'text-orange' : 'text-muted'}">${tJobs}</div>
            <div class="stat-label">TODAY'S JOBS</div>
          </div>
          <div class="stat-card ${c2} fade-up delay-1">
            <div class="stat-num ${c2 === 'warning' ? 'text-amber' : (c2 === 'good' ? 'text-green' : '')}">${pending}</div>
            <div class="stat-label">PENDING</div>
          </div>
          <div class="stat-card ${c3} fade-up delay-2">
            <div class="stat-num ${c3 === 'danger' ? 'text-red' : 'text-green'}">${alerts}</div>
            <div class="stat-label">STOCK ALERTS</div>
          </div>
        `;
      } catch (err) {
        console.error('Failed to load stats', err);
        document.getElementById('stat-cards').innerHTML = '<div class="stat-card"><div class="stat-num text-muted">-</div><div class="stat-label">ERROR LOADING</div></div>';
      }
    }

    // Fetch Today's Jobs
    async function fetchTodayJobs() {
      try {
        const todayStr = new Date().toISOString().split('T')[0];
        const res = await fetch(`${API_BASE}/jobs?limit=20&date_from=${todayStr}&date_to=${todayStr}`);
        if (!res.ok) throw new Error('API Error');
        const data = await res.json();
        
        const tbody = document.getElementById('today-jobs-body');
        tbody.innerHTML = '';
        
        if (data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state">
            <div class="empty-icon">📝</div>
            <div class="empty-title">No jobs logged today</div>
            <div class="empty-subtitle">New jobs will appear here</div>
          </div></td></tr>`;
          return;
        }

        data.forEach((job, index) => {
          const tr = document.createElement('tr');
          tr.className = 'clickable fade-up';
          tr.style.animationDelay = `${index * 30}ms`;
          tr.onclick = () => location.href = `jobcard.html?job=${job.id || job.job_id}`;
          
          let statusBadge = `<span class="badge badge-info">${job.status}</span>`;
          if (job.status === 'pending') statusBadge = `<span class="badge badge-pending">PEND</span>`;
          if (job.status === 'in_progress') statusBadge = `<span class="badge badge-in_progress">PROG</span>`;
          if (job.status === 'done') statusBadge = `<span class="badge badge-done">DONE</span>`;
          
          tr.innerHTML = `
            <td class="td-mono" data-label="JOB#">${job.id || job.job_id}</td>
            <td data-label="PARTY" style="max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${job.party_name}</td>
            <td data-label="JOB NAME" style="max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${job.job_name}</td>
            <td data-label="STATUS">${statusBadge}</td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        console.error('Failed to load jobs', err);
        document.getElementById('today-jobs-body').innerHTML = `<tr><td colspan="4" class="text-red">Error loading jobs</td></tr>`;
      }
    }

    // Init
    fetchStats();
    fetchTodayJobs();
  </script>
</body>
</html>

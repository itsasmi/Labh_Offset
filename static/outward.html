  <script>
    const API_BASE = '/api';

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      const parts = dateStr.split('-');
      if (parts.length === 3) {
        let y, m, d;
        if (parts[0].length === 4) {
          y = parts[0];
          m = parts[1];
          d = parts[2];
        } else if (parts[2].length === 4) {
          d = parts[0];
          m = parts[1];
          y = parts[2];
        } else {
          return dateStr;
        }
        return `${d.padStart(2, '0')}-${m.padStart(2, '0')}-${y}`;
      }
      return dateStr;
    }
    
    // Hamburger Menu Logic
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const menuOverlay = document.getElementById('menu-overlay');
    const sideMenu = document.getElementById('side-menu');
    const menuCloseBtn = document.getElementById('menu-close-btn');

    function toggleMenu() {
      menuOverlay.classList.toggle('open');
      sideMenu.classList.toggle('open');
    }

    hamburgerBtn.addEventListener('click', toggleMenu);
    menuCloseBtn.addEventListener('click', toggleMenu);
    menuOverlay.addEventListener('click', toggleMenu);
    
    // Default dates
    const today = new Date().toISOString().split('T')[0];
    const firstDayOfYear = new Date(new Date().getFullYear(), 0, 1).toISOString().split('T')[0];
    document.getElementById('date-from').value = firstDayOfYear;
    document.getElementById('date-to').value = today;

    async function initLists() {
      try {
        const [pRes, paRes] = await Promise.all([
          fetch(`${API_BASE}/parties`),
          fetch(`${API_BASE}/papers`)
        ]);
        const parties = await pRes.json();
        const papers = await paRes.json();

        const partyList = document.getElementById('party-list');
        parties.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.party_code;
          opt.textContent = p.party_name;
          partyList.appendChild(opt);
        });

        const paperList = document.getElementById('paper-list');
        papers.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p.paper_code;
          opt.textContent = p.description;
          paperList.appendChild(opt);
        });
      } catch (e) {
        console.error(e);
      }
    }

    async function loadOutward() {
      const from = document.getElementById('date-from').value;
      const to = document.getElementById('date-to').value;
      const query = document.getElementById('search-query').value;
      const party = document.getElementById('party-code').value;
      const paper = document.getElementById('paper-code').value;
      
      const body = document.getElementById('outward-body');
      body.innerHTML = '<tr><td colspan="4"><div class="row-spinner"><div class="spinner"></div>Searching...</div></td></tr>';

      try {
        const res = await fetch(`${API_BASE}/outward?date_from=${from}&date_to=${to}&party_code=${encodeURIComponent(party)}&paper_code=${encodeURIComponent(paper)}&global_query=${encodeURIComponent(query)}`);
        const data = await res.json();
        
        if (data.length === 0) {
          body.innerHTML = '<tr><td colspan="4" style="padding: 60px 20px !important; text-align: center !important; border: none !important;"><div class="empty-state">No records found.</div></td></tr>';
          return;
        }

        body.innerHTML = data.map(row => `
          <tr class="fade-up">
            <td data-label="DATE" style="white-space: nowrap;">${formatDate(row.date)}</td>
            <td data-label="JOB NAME">
              <div style="font-size: 10px; font-weight: 700; color: var(--primary); margin-bottom: 2px;">#${row.job_id}</div>
              <div style="font-weight: 600; color: var(--text);">${row.job_name}</div>
              <div style="font-size: 11px; color: var(--text3);">${row.party_name}</div>
            </td>
            <td data-label="PAPER / SIZE">
              <div style="font-size: 13px;">${row.paper_name}</div>
              <div style="font-size: 11px; color: var(--text3);">${row.paper_size || '-'} (${row.stock_type})</div>
            </td>
            <td class="td-right" data-label="SHEETS" style="font-weight: 700; color: var(--orange);">
              ${(row.used_sheets || 0).toLocaleString()}
            </td>
          </tr>
        `).join('');
      } catch (err) {
        body.innerHTML = '<tr><td colspan="4" style="padding: 40px; text-align: center; color: var(--red);">Error.</td></tr>';
      }
    }

    document.getElementById('btn-filter').onclick = loadOutward;
    initLists();
    loadOutward();
  </script>

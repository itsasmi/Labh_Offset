  <style>
    /* Make container full width for the wide queue table */
    .container {
      max-width: 98% !important;
      padding-left: 16px !important;
      padding-right: 16px !important;
    }

    /* Force Table view on mobile instead of card view */
    @media screen and (max-width: 768px) {
      table, .queue-table { display: table !important; }
      thead { display: table-header-group !important; }
      tbody { display: table-row-group !important; }
      tr { display: table-row !important; background: transparent !important; margin: 0 !important; border-radius: 0 !important; border: none !important; box-shadow: none !important; }
      th { display: table-cell !important; background: var(--surface2) !important; padding: 12px 8px !important; font-size: 10px !important; text-transform: uppercase !important; border-bottom: 1px solid var(--border) !important; }
      td { display: table-cell !important; padding: 12px 8px !important; text-align: left !important; border: none !important; border-bottom: 1px solid var(--border) !important; min-height: auto !important; }
      thead tr { position: static !important; }
      td:before { display: none !important; }
      .table-container { border: 1px solid var(--border) !important; box-shadow: var(--shadow-sm) !important; background: var(--surface) !important; margin-bottom: 80px !important; overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
    }
    
    /* Queue specific styles */
    .queue-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    .queue-table th {
      background: var(--bg2);
      color: var(--text3);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 12px 8px;
      text-align: left;
      border-bottom: 2px solid var(--border);
    }
    .queue-table td {
      padding: 12px 8px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      color: var(--text);
      font-size: 13px;
    }
    .queue-row {
      cursor: grab;
      transition: background-color 0.2s, box-shadow 0.2s;
      background: var(--card-bg);
    }
    .queue-row:active {
      cursor: grabbing;
    }
    .queue-row.dragging {
      opacity: 0.5;
      background: var(--bg2);
    }
    .queue-row.drag-over {
      border-top: 2px solid var(--primary);
    }
    .queue-row:hover {
      background: var(--bg2);
    }
    .seq-col {
      width: 70px;
      min-width: 70px;
      text-align: center;
      font-weight: 700;
      color: var(--primary);
      white-space: nowrap;
    }
    .td-mono {
      font-family: monospace;
      font-weight: bold;
      color: var(--primary);
      white-space: nowrap;
    }
    .badge-ready { background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; display: inline-block; }
    .badge-waiting { background: #fee2e2; color: #991b1b; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; display: inline-block; }
    
    .plate-box, .print-box {
      width: 28px;
      height: 28px;
      border: 2px solid #94a3b8;
      border-radius: 4px;
      display: inline-block;
      vertical-align: middle;
      background: #fff;
    }
    .print-box {
      display: none;
    }
    .done-toggle {
      width: 28px;
      height: 28px;
      cursor: pointer;
      vertical-align: middle;
    }
    .paper-info {
      font-size: 11px;
      color: var(--text2);
    }
    .paper-info strong {
      color: var(--text);
      font-size: 12px;
    }
    .actions-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .drag-handle {
      color: var(--text3);
      margin-right: 4px;
      font-size: 18px;
      cursor: grab;
      touch-action: none; /* Prevent scrolling when dragging handle on mobile */
      padding: 10px 4px; /* Bigger touch target vertically */
    }

    /* Print Styles */
    @media print {
      /* Hide everything unnecessary */
      .topbar, .bottom-nav, .actions-bar, .filters, #count-badge, .side-menu, .menu-overlay, .done-toggle {
        display: none !important;
      }
      .print-box {
        display: inline-block !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .plate-box {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      
      body {
        margin: 0;
        padding: 0;
        background: #fff;
      }
      .queue-table th, .queue-table td {
        border: 1px solid #000 !important;
        padding: 4px !important;
        font-size: 9pt !important;
        color: #000 !important;
        text-align: left;
        word-break: break-word;
      }
      
      .container {
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
        max-width: 100% !important;
        box-shadow: none !important;
      }
      
      /* Ensure backgrounds and colors print exactly as seen on screen */
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      /* Hide drag handles on print */
      .drag-handle {
        display: none !important;
      }
      
      h1.page-title {
        margin-bottom: 20px !important; 
        font-size: 18pt !important; 
        text-align: center !important;
      }
    }
  </style>

  <script>
    const API_BASE = '/api';
    let isDragging = false;
    let pollInterval = null;

    // Menu logic
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const menuOverlay = document.getElementById('menu-overlay');
    const sideMenu = document.getElementById('side-menu');
    const menuCloseBtn = document.getElementById('menu-close-btn');

    function toggleMenu() {
      menuOverlay.classList.toggle('open');
      sideMenu.classList.toggle('open');
    }
    hamburgerBtn.onclick = toggleMenu;
    menuCloseBtn.onclick = toggleMenu;
    menuOverlay.onclick = toggleMenu;

    document.getElementById('filter-machine').addEventListener('change', fetchQueue);

    async function fetchQueue(isSilent = false) {
      if (isDragging) return; // don't disrupt user during drag

      const filterMachine = document.getElementById('filter-machine').value;
      const tbody = document.getElementById('queue-body');
      
      if (!isSilent) {
        tbody.innerHTML = `<tr><td colspan="8"><div class="row-spinner"><div class="spinner"></div>Loading...</div></td></tr>`;
      }

      let url = `${API_BASE}/pending?`;
      if (filterMachine) url += `plate_size=${encodeURIComponent(filterMachine)}&`;

      try {
        const res = await fetch(url);
        const rawData = await res.json();
        const data = rawData.filter(job => job.is_waiting_for_paper === true);

        if (isDragging) return; // double check after fetch

        document.getElementById('count-badge').textContent = `${data.length} pending`;
        
        tbody.innerHTML = '';
        if (data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="8" style="padding: 40px; text-align: center; border: none;"><div style="color:var(--text3);">No jobs pending. Queue is empty.</div></td></tr>`;
          return;
        }

        data.forEach((job, index) => {
          const tr = document.createElement('tr');
          tr.className = 'queue-row';
                    tr.dataset.jobId = job.job_id;
          
          const availability = job.is_waiting_for_paper 
            ? `<span class="badge-waiting">WAITING PAPER</span>` 
            : `<span class="badge-ready">READY</span>`;

          tr.innerHTML = `
            <td class="seq-col" data-label="SEQ"><span class="seq-num">${index + 1}</span></td>
            <td class="td-mono" data-label="JOB#"><a href="jobcard.html?job=${job.job_id}">${job.job_id}</a></td>
            <td style="white-space:nowrap;" data-label="DATE">${job.date || ''}</td>
            <td style="white-space:nowrap;" data-label="M.SIZE">${job.plate_size || ''}</td>
            <td data-label="PARTY">${job.party_name || ''}</td>
            <td data-label="JOB NAME"><strong>${job.job_name}</strong></td>
            <td data-label="COPIES">${job.qty || ''}</td>
            <td data-label="PAPER SIZE">${job.paper_size || ''}</td>
            <td data-label="GSM">${job.gsm_desc || job.paper_code || ''}</td>
            <td data-label="SIDE">${job.printing || ''}</td>
            <td data-label="PULLING">${(job.pulling || '').replace(/PLANNED:\s*/gi, '')}</td>
            <td data-label="SET">${job.set_no || ''}</td>
            <td data-label="PROCESS">${job.operator_name || ''}</td>
            <td data-label="PAPER">${availability}</td>
                        <td style="text-align:center;" data-label="ACTION">
              <a href="inward.html?job_id=${job.job_id}" class="btn btn-primary" style="font-size: 10px; padding: 4px 8px; border-radius: 4px; text-decoration: none;">➕ INWARD</a>
            </td>
          `;

          
          
          tbody.appendChild(tr);
        });
      } catch (err) {
        if (!isSilent) tbody.innerHTML = `<tr><td colspan="16" style="color:red; text-align:center;">Error loading queue</td></tr>`;
      }
    }

    async function markDone(jobId, checkbox) {
      if (!confirm(`Mark job #${jobId} as DONE?`)) {
        checkbox.checked = false;
        return;
      }
      const res = await fetch(`${API_BASE}/jobs/${jobId}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'done' })
      });
      if (res.ok) {
        fetchQueue(true); // silent refresh
      } else {
        alert("Failed to mark done.");
        checkbox.checked = false;
      }
    }

    // Initial load
    fetchQueue();
  </script>

    <!-- Paper Filter Selector -->

    <div class="table-container" style="background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden;">

  <script>
    const API_BASE = '/api';

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      const parts = dateStr.split('-');
      if (parts.length === 3) {
        let y, m, d;
        if (parts[0].length === 4) {
          y = parts[0];
          m = parts[1];
          d = parts[2];
        } else if (parts[2].length === 4) {
          d = parts[0];
          m = parts[1];
          y = parts[2];
        } else {
          return dateStr;
        }
        return `${d.padStart(2, '0')}-${m.padStart(2, '0')}-${y}`;
      }
      return dateStr;
    }

    // Hamburger Menu Logic
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const menuOverlay = document.getElementById('menu-overlay');
    const sideMenu = document.getElementById('side-menu');
    const menuCloseBtn = document.getElementById('menu-close-btn');

    function toggleMenu() {
      menuOverlay.classList.toggle('open');
      sideMenu.classList.toggle('open');
    }

    hamburgerBtn.addEventListener('click', toggleMenu);
    menuCloseBtn.addEventListener('click', toggleMenu);
    menuOverlay.addEventListener('click', toggleMenu);
    
    const urlParams = new URLSearchParams(window.location.search);
    const partyCode = urlParams.get('party');
    const originCode = urlParams.get('origin');
    const initialPaper = urlParams.get('paper');
    const initialSize = urlParams.get('size');

    if (!partyCode) {
      location.href = 'stock.html';
    }

    let displayName = partyCode.toUpperCase();
    if (partyCode.toLowerCase() === 'company' && originCode) {
        displayName = `COMPANY STOCK (${originCode.toUpperCase()})`;
    } else if (partyCode.toLowerCase() === 'company') {
        displayName = 'COMPANY STOCK';
    }
    
    document.getElementById('party-code-display').textContent = displayName;

    async function loadPapersDropdown() {
      const select = document.getElementById('paper-select');
      try {
        let fetchUrl = `${API_BASE}/stock?party_code=${partyCode}`;
        if (partyCode && partyCode.toLowerCase() === 'company') {
          fetchUrl = `${API_BASE}/stock?stock_type=company`;
          if (originCode) fetchUrl += `&origin=${originCode}`;
        }
        const res = await fetch(fetchUrl);
        const data = await res.json();
        
        data.forEach(p => {
          const opt = document.createElement('option');
          opt.value = `${p.paper_code}|${p.paper_size}`;
          opt.textContent = `${p.paper_desc} (${p.paper_size}) - Balance: ${p.balance.toLocaleString()} sheets`;
          
          if (initialPaper && initialSize && 
              p.paper_code.toLowerCase() === initialPaper.toLowerCase() && 
              p.paper_size.toLowerCase().replace(/\s+/g, '') === initialSize.toLowerCase().replace(/\s+/g, '')) {
            opt.selected = true;
          }
          select.appendChild(opt);
        });
      } catch (err) {
        console.error("Error loading papers list", err);
      }
    }

    async function loadLedger() {
      const body = document.getElementById('ledger-body');
      const paperVal = document.getElementById('paper-select').value;
      
      let queryStr = '';
      if (paperVal) {
        const [pcode, psize] = paperVal.split('|');
        queryStr = `?paper_code=${encodeURIComponent(pcode)}&paper_size=${encodeURIComponent(psize)}`;
      }

      try {
        let ledgerUrl = `${API_BASE}/stock/party/${partyCode}${queryStr}`;
        if (partyCode.toLowerCase() === 'company' && originCode) {
          const separator = queryStr ? '&' : '?';
          ledgerUrl += `${separator}origin=${encodeURIComponent(originCode)}`;
        }

        const res = await fetch(ledgerUrl);
        const data = await res.json();
        
        if (data.length === 0) {
          body.innerHTML = '<tr><td colspan="5" style="padding: 40px; text-align: center; color: var(--text3);">No records.</td></tr>';
          return;
        }

        document.getElementById('party-name').textContent = partyCode.toUpperCase() + (paperVal ? ' - Paper History' : ' - Statement');

        body.innerHTML = data.map(row => {
          const isOut = row.type === 'outward';
          
          let detailsHtml = '';
          if (isOut) {
            detailsHtml = `
              <div style="font-weight: 600;">
                Job #${row.job_id}: <a href="jobcard.html?job=${row.job_id}" style="color: var(--primary); text-decoration: underline; font-weight: 700;">${row.job_name}</a>
              </div>
            `;
          } else {
            detailsHtml = `<div style="font-weight: 600; color: var(--text);">${row.supplier || 'Inward'}</div>`;
          }

          return `
            <tr class="fade-up">
              <td data-label="TYPE"><span class="badge ${isOut ? 'badge-error' : 'badge-success'}">${row.type.toUpperCase()}</span></td>
              <td data-label="DATE">${formatDate(row.date)}</td>
              <td data-label="DETAILS">
                ${detailsHtml}
                <div style="font-size: 11px; color: var(--text3);">${row.paper_desc || row.paper_code} (${row.paper_size})</div>
              </td>
              <td class="td-right" data-label="SHEETS" style="color: ${isOut ? 'var(--red)' : 'var(--green)'}; font-weight: 700;">
                ${isOut ? '-' : '+'}${row.sheets.toLocaleString()}
              </td>
              <td class="td-right" data-label="BALANCE" style="font-weight: 700; font-family: var(--mono); color: var(--text);">
                ${paperVal ? row.running_balance.toLocaleString() : '—'}
              </td>
            </tr>
          `;
        }).join('');
      } catch (err) {
        body.innerHTML = '<tr><td colspan="5" style="padding: 40px; text-align: center; color: var(--red);">Error.</td></tr>';
      }
    }

    function onPaperChange() {
      loadLedger();
    }

    async function initPage() {
      await loadPapersDropdown();
      loadLedger();
    }
    
    initPage();
  </script>

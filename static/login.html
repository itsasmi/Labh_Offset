<!DOCTYPE html>
<html lang="en">
<head>
  <script src="theme.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labh Offset - Login</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .login-container {
      width: calc(100% - 32px);
      max-width: 400px;
      margin: 12vh auto;
      padding: 30px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      text-align: center;
      box-shadow: var(--shadow-lg);
      transition: all var(--t);
    }
    @media (max-width: 480px) {
      .login-container {
        padding: 24px 20px;
        margin: 8vh auto;
      }
    }
    .login-logo {
      width: 150px;
      margin-bottom: 20px;
    }
    .form-group {
      text-align: left;
      margin-bottom: 15px;
    }
    .error-msg {
      color: var(--red);
      font-size: 13px;
      margin-top: 15px;
      display: none;
      background: rgba(255,0,0,0.1);
      padding: 10px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="login-container fade-up">
    <img src="Icon/labhoffset.png" class="login-logo" alt="Logo">
    <h2 style="margin-bottom: 20px; font-weight: 600;">Welcome Back</h2>
    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" class="form-control" required placeholder="Enter your username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-control" required placeholder="Enter your password">
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top: 25px; height: 45px;">LOGIN</button>
      <div id="errorMsg" class="error-msg">Invalid username or password</div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        if (res.ok) {
          window.location.href = '/index.html';
        } else {
          const data = await res.json();
          errorMsg.textContent = data.detail || 'Invalid username or password';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'Server error. Please try again.';
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
